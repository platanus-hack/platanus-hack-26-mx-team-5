# Orquestacion para desarrollo. Monta el codigo y los modelos como volumenes
# para iterar sin reconstruir la imagen en cada cambio.
services:
  detector:
    build: .
    image: meta-traffic-light:cpu
    container_name: traffic-light-detector
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./data:/app/data
      - ./output:/app/output
    # Por defecto procesa el video de prueba y escribe el anotado en output/.
    # Sobreescribe el comando con:  docker compose run --rm detector <args>
    command: >
      --source /app/data/sample.mp4
      --output /app/output/annotated.mp4
      --no-display
